    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Datos de gastos (LUZ, AGUA, INTERNET, TELECABLE)

            // 2022

            { mes: "Mar-2022", luz: 49900, agua: 12880, internet: 27980, telecable: 0 },
            { mes: "Abr-2022", luz: 31400, agua: 11690, internet: 27980, telecable: 0 },
            { mes: "May-2022", luz: 42000, agua: 14060, internet: 27980, telecable: 0 },

            { mes: "Ago-2022", luz: 74400, agua: 8720, internet: 10539, telecable: 0 },
            { mes: "Sep-2022", luz: 51200, agua: 8720, internet: 23990, telecable: 0 },
            { mes: "Oct-2022", luz: 28800, agua: 11690, internet: 23990, telecable: 0 },
            { mes: "Nov-2022", luz: 39200, agua: 19820, internet: 24662, telecable: 0 },
            { mes: "Dic-2022", luz: 32800, agua: 17450, internet: 24662, telecable: 0 },
            
            // 2023
            { mes: "Ene-2023", luz: 31300, agua: 11500, internet: 27980, telecable: 0 },
            { mes: "Feb-2023", luz: 6600, agua: 10370, internet: 27980, telecable: 0 },
            { mes: "Mar-2023", luz: 49900, agua: 12880, internet: 27980, telecable: 0 },
            { mes: "Abr-2023", luz: 31400, agua: 11690, internet: 27980, telecable: 0 },
            { mes: "May-2023", luz: 42000, agua: 14060, internet: 27980, telecable: 0 },
            { mes: "Jun-2023", luz: 41500, agua: 12880, internet: 17990, telecable: 0 },
            { mes: "Jul-2023", luz: 37000, agua: 9320, internet: 17990, telecable: 0 },
            { mes: "Ago-2023", luz: 74400, agua: 8720, internet: 10539, telecable: 0 },
            { mes: "Sep-2023", luz: 51200, agua: 8720, internet: 23990, telecable: 0 },
            { mes: "Oct-2023", luz: 28800, agua: 11690, internet: 23990, telecable: 0 },
            { mes: "Nov-2023", luz: 39200, agua: 19820, internet: 24662, telecable: 0 },
            { mes: "Dic-2023", luz: 32800, agua: 17450, internet: 24662, telecable: 0 },
            
            // 2024
            { mes: "Ene-2024", luz: 40000, agua: 8720, internet: 24662, telecable: 0 },
            { mes: "Feb-2024", luz: 52800, agua: 8870, internet: 24662, telecable: 0 },
            { mes: "Mar-2024", luz: 38000, agua: 15510, internet: 24662, telecable: 0 },
            { mes: "Abr-2024", luz: 45700, agua: 14300, internet: 24662, telecable: 0 },
            { mes: "May-2024", luz: 55800, agua: 13090, internet: 24662, telecable: 0 },
            { mes: "Jun-2024", luz: 57000, agua: 8270, internet: 24662, telecable: 0 },
            { mes: "Jul-2024", luz: 76700, agua: 6460, internet: 24662, telecable: 0 },
            { mes: "Ago-2024", luz: 72900, agua: 19120, internet: 24662, telecable: 0 },
            { mes: "Sep-2024", luz: 56000, agua: 11890, internet: 24662, telecable: 0 },
            { mes: "Oct-2024", luz: 81500, agua: 8530, internet: 24662, telecable: 0 },
            { mes: "Nov-2024", luz: 64100, agua: 18490, internet: 24662, telecable: 0 },
            { mes: "Dic-2024", luz: 51300, agua: 13510, internet: 24662, telecable: 0 },
            
            // 2025
            { mes: "Ene-2025", luz: 85400, agua: 8530, internet: 24662, telecable: 0 },
            { mes: "Feb-2025", luz: 86400, agua: 13510, internet: 24662, telecable: 0 },
            { mes: "Mar-2025", luz: 89400, agua: 12270, internet: 24662, telecable: 0 },
            { mes: "Abr-2025", luz: 92900, agua: 12270, internet: 24662, telecable: 0 },
            { mes: "May-2025", luz: 111400, agua: 13510, internet: 24662, telecable: 0 },
            { mes: "Jun-2025", luz: 111800, agua: 12270, internet: 24662, telecable: 0 },
            { mes: "Jul-2025", luz: 136400, agua: 13860, internet: 24662, telecable: 0 },
            { mes: "Ago-2025", luz: 121800, agua: 15140, internet: 24662, telecable: 0 },
            { mes: "Sep-2025", luz: 135300, agua: 12910, internet: 24662, telecable: 0 },
            { mes: "Oct-2025", luz: 105800, agua: 24950, internet: 24662, telecable: 0 },
            { mes: "Nov-2025", luz: 109600, agua: 17180, internet: 24662, telecable: 0 },
            { mes: "Dic-2025", luz: 109100, agua: 22290, internet: 24662, telecable: 0 },
            
            // 2026
            { mes: "Ene-2026", luz: 114500, agua: 19790, internet: 24662, telecable: 0 },
            { mes: "Feb-2026", luz: 128700, agua: 21140, internet: 24662, telecable: 0 },
            { mes: "Mar-2026", luz: 101000, agua: 15840, internet: 24662, telecable: 0 },
            { mes: "Abr-2026", luz: 101300, agua: 14630, internet: 24662, telecable: 0 },
        ];

        const formatCLP = (val) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 }).format(val);

        const ChartComponent = ({ datos, tipo }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !datos.length) return;

                const ctx = canvasRef.current.getContext('2d');
                
                if (chartRef.current) chartRef.current.destroy();

                const colors = {
                    luz: { border: '#f97316', bg: 'rgba(249, 115, 22, 0.1)' },
                    agua: { border: '#3b82f6', bg: 'rgba(59, 130, 246, 0.1)' },
                    internet: { border: '#8b5cf6', bg: 'rgba(139, 92, 246, 0.1)' },
                    telecable: { border: '#ec4899', bg: 'rgba(236, 72, 153, 0.1)' }
                };

                const color = colors[tipo];

                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: datos.map(d => d.mes),
                        datasets: [{
                            label: tipo.charAt(0).toUpperCase() + tipo.slice(1),
                            data: datos.map(d => d[tipo]),
                            borderColor: color.border,
                            backgroundColor: color.bg,
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: color.border,
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return '$' + value.toLocaleString();
                                    }
                                },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });

                return () => {
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [datos, tipo]);

            return <canvas ref={canvasRef}></canvas>;
        };

        const GastoComparativo = ({ datos }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !datos.length) return;

                const ctx = canvasRef.current.getContext('2d');
                
                if (chartRef.current) chartRef.current.destroy();

                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: datos.map(d => d.mes),
                        datasets: [
                            {
                                label: 'Luz',
                                data: datos.map(d => d.luz),
                                backgroundColor: '#f97316'
                            },
                            {
                                label: 'Agua',
                                data: datos.map(d => d.agua),
                                backgroundColor: '#3b82f6'
                            },
                            {
                                label: 'Internet',
                                data: datos.map(d => d.internet),
                                backgroundColor: '#8b5cf6'
                            },
                            {
                                label: 'Telecable',
                                data: datos.map(d => d.telecable),
                                backgroundColor: '#ec4899'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { padding: 20, font: { size: 12, weight: 'bold' } }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return '$' + value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [datos]);

            return <canvas ref={canvasRef}></canvas>;
        };

        const GraficoTodosLosAños = ({ datos, mostrarLuz, mostrarAgua, mostrarInternet }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                const ctx = canvasRef.current.getContext('2d');
                
                if (chartRef.current) chartRef.current.destroy();

                const datasets = [];

                if (mostrarLuz) {
                    datasets.push({
                        label: 'Luz',
                        data: datos.map(d => d.luz),
                        borderColor: '#f97316',
                        backgroundColor: 'rgba(249, 115, 22, 0.05)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 2,
                        pointBackgroundColor: '#f97316',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1
                    });
                }

                if (mostrarAgua) {
                    datasets.push({
                        label: 'Agua',
                        data: datos.map(d => d.agua),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 2,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1
                    });
                }

                if (mostrarInternet) {
                    datasets.push({
                        label: 'Internet',
                        data: datos.map(d => d.internet),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.05)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4,
                        pointRadius: 2,
                        pointBackgroundColor: '#8b5cf6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1
                    });
                }

                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: datos.map(d => d.mes),
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { padding: 20, font: { size: 12, weight: 'bold' } }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return '$' + value.toLocaleString();
                                    }
                                },
                                grid: { color: 'rgba(0, 0, 0, 0.05)' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });

                return () => {
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [datos, mostrarLuz, mostrarAgua, mostrarInternet]);

            return <canvas ref={canvasRef}></canvas>;
        };

        const StatCard = ({ titulo, valor, color, icono }) => (
            <div className={`${color} stat-card text-center`}>
                <p className="text-sm opacity-90 mb-2">{titulo}</p>
                <p className="text-3xl font-black">{icono}</p>
                <p className="text-2xl font-bold mt-2">{formatCLP(valor)}</p>
            </div>
        );

        const App = () => {
            const [year, setYear] = useState(2025);
            const [mes, setMes] = useState(null);
            const [vistaGlobal, setVistaGlobal] = useState(false);
            const [mostrarLuz, setMostrarLuz] = useState(true);
            const [mostrarAgua, setMostrarAgua] = useState(true);
            const [mostrarInternet, setMostrarInternet] = useState(true);

            const datosYear = useMemo(() => 
                gastosData.filter(d => d.mes.includes(year.toString())),
                [year]
            );

            const datosMes = useMemo(() => {
                if (!mes) return datosYear[datosYear.length - 1];
                return datosYear.find(d => d.mes.includes(mes));
            }, [mes, datosYear]);

            const estadisticas = useMemo(() => {
                const tipos = ['luz', 'agua', 'internet'];
                const stats = {};
                tipos.forEach(tipo => {
                    const valores = datosYear.map(d => d[tipo]);
                    stats[tipo] = {
                        promedio: Math.round(valores.reduce((a, b) => a + b, 0) / valores.length),
                        maximo: Math.max(...valores),
                        minimo: Math.min(...valores.filter(v => v > 0))
                    };
                });
                return stats;
            }, [datosYear]);

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="mb-8 flex justify-between items-center">
                            <div>
                                <h1 className="text-4xl font-black text-white mb-2 glow-text">Análisis de Gastos</h1>
                                <p className="text-white opacity-90">Luz, Agua e Internet 2020-2026</p>
                            </div>
                            <button
                                onClick={() => setVistaGlobal(!vistaGlobal)}
                                className={`px-8 py-3 rounded-lg font-bold text-lg transition ${vistaGlobal ? 'gradient-orange text-white' : 'bg-white text-gray-800 hover:bg-gray-100'}`}
                            >
                                {vistaGlobal ? '📊 Vista Global' : 'Por Año'}
                            </button>
                        </div>

                        {!vistaGlobal && (
                            <>
                        {/* Año Selector */}
                        <div className="card-glass p-6 mb-8">
                            <label className="text-gray-700 font-bold mb-4 block">Seleccionar Año</label>
                            <div className="flex gap-3 flex-wrap">
                                {[2020, 2021, 2022, 2023, 2024, 2025, 2026].map(y => (
                                    <button
                                        key={y}
                                        onClick={() => { setYear(y); setMes(null); }}
                                        className={`px-6 py-2 rounded-lg font-bold transition ${year === y ? 'gradient-primary text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                    >
                                        {y}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Estadísticas Generales */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <StatCard titulo="Luz Promedio" valor={estadisticas.luz.promedio} color="gradient-orange" icono="💡" />
                            <StatCard titulo="Agua Promedio" valor={estadisticas.agua.promedio} color="gradient-primary" icono="💧" />
                            <StatCard titulo="Internet Promedio" valor={estadisticas.internet.promedio} color="stat-orange" icono="📡" />
                        </div>

                        {/* Gráficas por Tipo - Por Año */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div className="card-glass p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Evolución LUZ 💡</h3>
                                <div className="chart-container">
                                    <ChartComponent datos={datosYear} tipo="luz" />
                                </div>
                            </div>
                            <div className="card-glass p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Evolución AGUA 💧</h3>
                                <div className="chart-container">
                                    <ChartComponent datos={datosYear} tipo="agua" />
                                </div>
                            </div>
                            <div className="card-glass p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Evolución INTERNET 📡</h3>
                                <div className="chart-container">
                                    <ChartComponent datos={datosYear} tipo="internet" />
                                </div>
                            </div>
                            <div className="card-glass p-6">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Comparativa Mensual</h3>
                                <div className="chart-container">
                                    <GastoComparativo datos={datosYear} />
                                </div>
                            </div>
                        </div>

                        {/* Tabla Detallada */}
                        <div className="card-glass p-8 mb-8">
                            <h3 className="text-xl font-bold text-gray-800 mb-6">Desglose Mensual {year}</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="gradient-primary text-white">
                                            <th className="px-4 py-3 text-left font-bold">Mes</th>
                                            <th className="px-4 py-3 text-right font-bold">Luz</th>
                                            <th className="px-4 py-3 text-right font-bold">Agua</th>
                                            <th className="px-4 py-3 text-right font-bold">Internet</th>
                                            <th className="px-4 py-3 text-right font-bold">Telecable</th>
                                            <th className="px-4 py-3 text-right font-bold">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {datosYear.map((dato, idx) => (
                                            <tr key={idx} className={idx % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                                <td className="px-4 py-3 font-bold text-gray-800">{dato.mes}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.luz)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.agua)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.internet)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{dato.telecable > 0 ? formatCLP(dato.telecable) : '-'}</td>
                                                <td className="px-4 py-3 text-right font-bold text-orange-600">{formatCLP(dato.luz + dato.agua + dato.internet + dato.telecable)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Resumen Estadístico */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 LUZ {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.minimo)}</span></p>
                            </div>
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 AGUA {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.minimo)}</span></p>
                            </div>
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 INTERNET {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.minimo)}</span></p>
                            </div>
                        </div>
                            </>
                        )}

                        {/* Vista Global - Todos los Años */}
                        {vistaGlobal && (
                        <div className="card-glass p-8 mb-8">
                            <div className="mb-6">
                                <h3 className="text-2xl font-bold text-gray-800 mb-6">Evolución Completa 2020-2026 📈</h3>
                                
                                {/* Checkboxes para activar/desactivar servicios */}
                                <div className="flex flex-wrap gap-6 mb-6 p-4 bg-gray-50 rounded-lg">
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={mostrarLuz}
                                            onChange={() => setMostrarLuz(!mostrarLuz)}
                                            className="w-5 h-5 cursor-pointer"
                                        />
                                        <span className="font-bold text-gray-700">💡 Luz</span>
                                    </label>
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={mostrarAgua}
                                            onChange={() => setMostrarAgua(!mostrarAgua)}
                                            className="w-5 h-5 cursor-pointer"
                                        />
                                        <span className="font-bold text-gray-700">💧 Agua</span>
                                    </label>
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={mostrarInternet}
                                            onChange={() => setMostrarInternet(!mostrarInternet)}
                                            className="w-5 h-5 cursor-pointer"
                                        />
                                        <span className="font-bold text-gray-700">📡 Internet</span>
                                    </label>
                                </div>
                            </div>
                            
                            <div style={{height: '500px'}}>
                                <GraficoTodosLosAños 
                                    datos={gastosData} 
                                    mostrarLuz={mostrarLuz} 
                                    mostrarAgua={mostrarAgua} 
                                    mostrarInternet={mostrarInternet}
                                />
                            </div>
                        </div>
                        )}

                        {/* Tabla Detallada */}
                        {!vistaGlobal && (
                        <div className="card-glass p-8 mb-8">
                            <h3 className="text-xl font-bold text-gray-800 mb-6">Desglose Mensual {year}</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="gradient-primary text-white">
                                            <th className="px-4 py-3 text-left font-bold">Mes</th>
                                            <th className="px-4 py-3 text-right font-bold">Luz</th>
                                            <th className="px-4 py-3 text-right font-bold">Agua</th>
                                            <th className="px-4 py-3 text-right font-bold">Internet</th>
                                            <th className="px-4 py-3 text-right font-bold">Telecable</th>
                                            <th className="px-4 py-3 text-right font-bold">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {datosYear.map((dato, idx) => (
                                            <tr key={idx} className={idx % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                                <td className="px-4 py-3 font-bold text-gray-800">{dato.mes}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.luz)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.agua)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{formatCLP(dato.internet)}</td>
                                                <td className="px-4 py-3 text-right text-gray-700">{dato.telecable > 0 ? formatCLP(dato.telecable) : '-'}</td>
                                                <td className="px-4 py-3 text-right font-bold text-orange-600">{formatCLP(dato.luz + dato.agua + dato.internet + dato.telecable)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        )}

                        {/* Resumen Estadístico */}
                        {!vistaGlobal && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 LUZ {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-orange-600">{formatCLP(estadisticas.luz.minimo)}</span></p>
                            </div>
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 AGUA {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-blue-600">{formatCLP(estadisticas.agua.minimo)}</span></p>
                            </div>
                            <div className="card-glass p-6">
                                <h4 className="font-bold text-gray-800 mb-4">📊 INTERNET {year}</h4>
                                <p className="text-sm text-gray-600 mb-2">Máximo: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.maximo)}</span></p>
                                <p className="text-sm text-gray-600 mb-2">Promedio: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.promedio)}</span></p>
                                <p className="text-sm text-gray-600">Mínimo: <span className="font-bold text-purple-600">{formatCLP(estadisticas.internet.minimo)}</span></p>
                            </div>
                        </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
